name: Zero trust Build and  Deploy to AKS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  APP_NAME: nextjs-webapp
  IMAGE_NAME: nextjs-webapp
  K8S_NAMESPACE: nextjs-webapp
  KUSTOMIZE_CI_OVERLAY_DIR: k8s/overlays/ci
  HF_MODEL: sumitp76/cve-exploitability

jobs:
  validate-build-runner:
    name: Validate Build Runner
    runs-on: self-hosted

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          
      - name: Pull build runner image
        run: |
          az acr login --name "${{ vars.ACR_NAME }}"
          docker pull "${{ vars.ACR_NAME }}.azurecr.io/nextjs-build-runner:3.0"

      - name: Verify build runner digest
        shell: bash
        run: |
          EXPECTED_DIGEST="${{ vars.TRUSTED_BUILD_RUNNER_DIGEST }}"
          ACTUAL_DIGEST=$(
            docker inspect \
              "${{ vars.ACR_NAME }}.azurecr.io/nextjs-build-runner:3.0" \
              --format='{{index .RepoDigests 0}}' \
              | cut -d@ -f2
            )

          echo "Expected: $EXPECTED_DIGEST"
          echo "Actual:   $ACTUAL_DIGEST"

          if [ "$EXPECTED_DIGEST" != "$ACTUAL_DIGEST" ]; then
            echo "Build runner digest verification failed"
          fi
          echo "Build runner digest verification successful"

    
  prepare:
    name: Prepare pipeline variables
    runs-on: self-hosted
    needs: validate-build-runner
    outputs:
      acr_login_server: ${{ steps.vars.outputs.acr_login_server }}
      image_tag: ${{ steps.vars.outputs.image_tag }}
      image_uri: ${{ steps.vars.outputs.image_uri }}

    steps:
      - name: Set deployment variables
        id: vars
        shell: bash
        run: |
          ACR_LOGIN_SERVER="${{ vars.ACR_NAME }}.azurecr.io"
          IMAGE_TAG="${GITHUB_SHA::12}"
          IMAGE_URI="${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${IMAGE_TAG}"

          echo "acr_login_server=${ACR_LOGIN_SERVER}" >> "${GITHUB_OUTPUT}"
          echo "image_tag=${IMAGE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "image_uri=${IMAGE_URI}" >> "${GITHUB_OUTPUT}"

  build-sbom-provenance-push:
    name: Build, sbom, provenance and push image
    runs-on: [ self-hosted, build ]
    needs: prepare
    
    outputs:
      image_digest: ${{ steps.build.outputs.digest }}

    container:
      image: ${{ vars.ACR_NAME }}.azurecr.io/nextjs-build-runner:3.0
      credentials:
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}
      #options: --user root
      options:  --group-add 988
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock
        - /opt/spire/sockets:/opt/spire/sockets

    steps:
      - name: Check current user
        run: |
          whoami
          id
          id -u 
          
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify commit is signed
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COMMIT_SHA="${{ github.sha }}"
          RESPONSE=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/commits/$COMMIT_SHA")

          VERIFIED=$(echo "$RESPONSE" | jq -r '.commit.verification.verified')
          REASON=$(echo "$RESPONSE" | jq -r '.commit.verification.reason')

          echo "Verified: $VERIFIED"
          echo "Reason: $REASON"

          if [ "$VERIFIED" != "true" ]; then
            echo "Commit signature verification failed"
            exit 1
          fi
          

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Verify Cosign
        run: cosign version

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        shell: bash
        run: az acr login --name "${{ vars.ACR_NAME }}"

      - name: Fetch SPIFFE identity
        id: spiffe
        shell: bash
        run: |
          spire-agent api fetch x509 \
           -socketPath /opt/spire/sockets/agent.sock > svid.txt
          cat svid.txt

          SPIFFE_ID=$(awk '/SPIFFE ID:/ {print $3; exit}' svid.txt)
          #SPIFFE_ID=$(grep -o 'spiffe://[^ ]*' svid.txt | head -1)
          
          if [ -z "$SPIFFE_ID" ]; then
            echo "Failed to fetch SPIFFE ID"
            exit 1
          fi

          echo "Builder SPIFFE ID: $SPIFFE_ID"
          echo "builder_spiffe_id=$SPIFFE_ID" >> "$GITHUB_OUTPUT"
          echo "BUILDER_SPIFFE_ID=$SPIFFE_ID" >> "$GITHUB_ENV"

      - name: Debug SPIFFE env
        shell: bash
        run: |
          echo "BUILDER_SPIFFE_ID from env: ${BUILDER_SPIFFE_ID}"
          echo "builder_spiffe_id from step output: ${{ steps.spiffe.outputs.builder_spiffe_id }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container

      - name: Build and push image using BuildKit
        id: build
        uses: docker/build-push-action@v7
        with:
          context: "{{defaultContext}}"
          file: ./Dockerfile
          push: true
          tags: |
            ${{ needs.prepare.outputs.image_uri }}
            ${{ needs.prepare.outputs.acr_login_server }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false
          build-args: |
            BUILDKIT_CONTEXT_KEEP_GIT_DIR=1
      
      - name: Confirm containerized build
        run: |
          cat /etc/os-release
          ls -la /.dockerenv || true

      - name: Sign Image
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes \
            "${{ needs.prepare.outputs.acr_login_server }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}"

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM
        run: |
          syft "${{ needs.prepare.outputs.acr_login_server }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}" \
            -o spdx-json=sbom.spdx.json

      - name: Scan SBOM for CVEs (Grype)
        id: scan
        shell: bash
        run: |
          grype version
          
          grype sbom:sbom.spdx.json -o json > grype.json
          # deduped plain CVE list (also used to detect "nothing found")
          jq -r '.matches[].vulnerability.id' grype.json | grep -E '^CVE-' | sort -u > cves.txt
          echo "count=$(wc -l < cves.txt)" >> "$GITHUB_OUTPUT"
          echo "Found $(wc -l < cves.txt) CVEs"

      - name: Score exploitability (pull & run inference image)
        if: steps.scan.outputs.count != '0'
        run: |
          docker pull sumitiitj26/cve_explotability:latest
          cid=$(docker create sumitiitj26/cve_explotability:latest \
            --from-hub "${{ env.HF_MODEL }}" \
            --cves $(tr '\n' ' ' < cves.txt) \
            --out /app/exploitability.csv)
          docker start -a "$cid"
          docker cp "$cid:/app/exploitability.csv" ./exploitability.csv
          docker rm "$cid"
          cat exploitability.csv

      - name: Upload exploitability report
        if: steps.scan.outputs.count != '0'
        uses: actions/upload-artifact@v4
        with:
          name: exploitability-report
          path: exploitability.csv

      - name: Attach SBOM attestation
        run: |
          cosign attest --yes \
            --predicate sbom.spdx.json \
            --type spdxjson \
            "${{ needs.prepare.outputs.acr_login_server }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}"

      - name: Create provenance predicate
        shell: bash
        env:
          TRUSTED_BUILD_RUNNER_DIGEST: ${{ secrets.TRUSTED_BUILD_RUNNER_DIGEST }}
          BUILDER_SPIFFE_ID: ${{ steps.spiffe.outputs.builder_spiffe_id }}
        run: |
          if [ -z "$TRUSTED_BUILD_RUNNER_DIGEST" ]; then
            echo "TRUSTED_BUILD_RUNNER_DIGEST is empty"
            exit 1
          fi

          if [ -z "$BUILDER_SPIFFE_ID" ]; then
            echo "BUILDER_SPIFFE_ID is empty"
            exit 1
          fi
        
          jq -n \
            --arg repo "git+https://github.com/${{ github.repository }}" \
            --arg sha "${{ github.sha }}" \
            --arg run_id "${{ github.run_id }}" \
            --arg spiffe_id "$BUILDER_SPIFFE_ID" \
            --arg runner_digest "$TRUSTED_BUILD_RUNNER_DIGEST" \
            '{
              builder: {
                id: $spiffe_id,
                runnerDigest: $runner_digest
              },
              buildType: "https://github.com/Attestations/GitHubActionsWorkflow",
              invocation: {
                configSource: {
                  uri: $repo,
                  digest: {
                    sha1: $sha
                  },
                  entryPoint: ".github/workflows/pipeline.yml"
                }
              },
              metadata: {
                buildInvocationId: $run_id,
                completeness: {
                  parameters: true,
                  environment: true,
                  materials: true
                },
                reproducible: false
              }
            }' > provenance.json

      - name: Validate provenance predicate before attestation
        shell: bash
        run: |
          echo "Generated provenance:"
          cat provenance.json

          echo "Builder ID:"
          jq -r '.builder.id' provenance.json

          echo "Runner digest:"
          jq -r '.builder.runnerDigest' provenance.json

          jq -e '.builder.runnerDigest != null and .builder.runnerDigest != ""' provenance.json
          

      - name: Attach provenance attestation
        shell: bash
        run: |
          cosign attest --yes \
            --predicate provenance.json \
            --type https://slsa.dev/provenance/v0.2 \
            "${{ needs.prepare.outputs.acr_login_server }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}"

      - name: Verify Signature
        run: |
          cosign verify \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${{ needs.prepare.outputs.acr_login_server }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}"
  

  validate-deply-runner:
    name: Validate Deploy Runner
    runs-on: self-hosted
    needs: 
      - validate-build-runner
      - build-sbom-provenance-push

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          
      - name: Pull deploy runner image
        run: |
          az acr login --name "${{ vars.ACR_NAME }}"
          docker pull "${{ vars.ACR_NAME }}.azurecr.io/nextjs-deploy-runner:1.0"

      - name: Verify deploy runner digest
        shell: bash
        run: |
          EXPECTED_DIGEST="${{ vars.TRUSTED_DEPLOY_RUNNER_DIGEST }}"
          ACTUAL_DIGEST=$(
            docker inspect \
              "${{ vars.ACR_NAME }}.azurecr.io/nextjs-deploy-runner:1.0" \
              --format='{{index .RepoDigests 0}}' \
              | cut -d@ -f2
            )

          echo "Expected: $EXPECTED_DIGEST"
          echo "Actual:   $ACTUAL_DIGEST"

          if [ "$EXPECTED_DIGEST" != "$ACTUAL_DIGEST" ]; then
            echo "Deploy runner digest verification failed"
          fi
          echo "Deploy runner digest verification successful"

          
  predeploy-verification:
    name: Predeployment supply chain verification
    runs-on: [ self-hosted, deploy ]
    needs:
      - prepare
      - build-sbom-provenance-push
      - validate-deply-runner

    container:
      image: ${{ vars.ACR_NAME }}.azurecr.io/nextjs-deploy-runner:1.0
      credentials:
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
      
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR for Cosign
        shell: bash
        run: |
          TOKEN=$(az acr login --name "${{ vars.ACR_NAME }}" --expose-token --query accessToken -o tsv)
          cosign login \
            "${{ vars.ACR_NAME }}.azurecr.io" \
            --username 00000000-0000-0000-0000-000000000000 \
            --password "$TOKEN"

      - name: Set image reference
        id: image
        run: |
          IMAGE_REF="${{ needs.prepare.outputs.acr_login_server }}/${{ env.IMAGE_NAME }}@${{ needs.build-sbom-provenance-push.outputs.image_digest }}"
          echo "image_ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"
          echo "IMAGE_REF=${IMAGE_REF}" >> "$GITHUB_ENV"
          
      - name: Print Cosign Tree
        run: |
          echo "Inspecting $IMAGE_REF"
          cosign tree "$IMAGE_REF"

      - name: Verify image signature
        run: |
          cosign verify \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "$IMAGE_REF"

      - name: Verify SBOM attestation
        run: |
          cosign verify-attestation \
            --type spdxjson \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "$IMAGE_REF" \

      - name: Verify provenance attestation
        run: |
          cosign verify-attestation \
            --type https://slsa.dev/provenance/v0.2 \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "$IMAGE_REF" > provenance-attestation.json

      - name: Verify build runner digest from provenance
        shell: bash
        run: |
          EXPECTED_RUNNER_DIGEST="${{ secrets.TRUSTED_BUILD_RUNNER_DIGEST }}"
          
          cosign verify-attestation \
            --type https://slsa.dev/provenance/v0.2 \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "$IMAGE_REF" > provenance-attestation.json
          
          cat provenance-attestation.json

          ACTUAL_RUNNER_DIGEST=$(cat provenance-attestation.json \
            | jq -r '.payload' \
            | base64 -d \
            | jq -r '.predicate.builder.runnerDigest')

          echo "Expected runner digest: $EXPECTED_RUNNER_DIGEST"
          echo "Actual runner digest:   $ACTUAL_RUNNER_DIGEST"

          if [ -z "$ACTUAL_RUNNER_DIGEST" ] || [ "$ACTUAL_RUNNER_DIGEST" = "null" ]; then
            echo "Runner digest missing from provenance"
            exit 1
          fi
    
          if [ "$ACTUAL_RUNNER_DIGEST" != "$EXPECTED_RUNNER_DIGEST" ]; then
            echo "Build runner digest verification failed"
          fi

          echo "Build runner digest verified from signed provenance"

      - name: Verify expected SPIFFE builder identity
        shell: bash
        run: |
          EXPECTED_SPIFFE_ID="spiffe://supplychain.local/ci/docker-builder/nextjs-webapp"

          cosign verify-attestation \
            --type https://slsa.dev/provenance/v0.2 \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "$IMAGE_REF" > provenance-attestation.json

          BUILDER_ID=$(cat provenance-attestation.json \
            | jq -r '.payload' \
            | base64 -d \
            | jq -r '.predicate.builder.id')

          echo "Builder ID from provenance: $BUILDER_ID"
          if [ "$BUILDER_ID" != "$EXPECTED_SPIFFE_ID" ]; then
            echo "Invalid builder identity"
            exit 1
          fi

          echo "Trusted SPIFFE builder identity verified"

      - name: Verify Rekor transparency log evidence
        shell: bash
        run: |
          echo "Verifying Rekor transparency log evidence for: $IMAGE_REF"
          cosign verify \
            --rekor-url https://rekor.sigstore.dev \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "$IMAGE_REF" > rekor-image-signature.json

          cosign verify-attestation \
            --rekor-url https://rekor.sigstore.dev \
            --type https://slsa.dev/provenance/v0.2 \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "$IMAGE_REF" > rekor-provenance-attestation.json

          echo "Rekor transparency log verification completed."
          echo "Image signature Rekor evidence:"
          head -40 rekor-image-signature.json

          echo "Provenance attestation Rekor evidence:"
          head -40 rekor-provenance-attestation.json

      - name: Predeployment verification passed
        run: |
          echo "Supply chain verification passed for $IMAGE_REF"

  
  prepare-aks:
    name: Prepare AKS namespace and secrets
    runs-on: [ self-hosted, deploy ]
    needs: 
      - build-sbom-provenance-push
      - predeploy-verification
  
    container:
      image: ${{ vars.ACR_NAME }}.azurecr.io/nextjs-deploy-runner:1.0
      credentials:
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        shell: bash
        run: |
          az aks get-credentials \
            --resource-group "${{ vars.AKS_RESOURCE_GROUP }}" \
            --name "${{ vars.AKS_CLUSTER_NAME }}" \
            --overwrite-existing

      - name: Create or update namespace
        shell: bash
        run: |
          kubectl create namespace "${K8S_NAMESPACE}" --dry-run=client -o yaml | kubectl apply -f -
          kubectl label namespace "${K8S_NAMESPACE}" istio-injection=enabled --overwrite

      - name: Create or update MongoDB secret
        shell: bash
        run: |
          kubectl create secret generic mongodb-credentials \
            --namespace "${K8S_NAMESPACE}" \
            --from-literal=MONGODB_URI='${{ secrets.MONGODB_URI }}' \
            --dry-run=client -o yaml | kubectl apply -f -

  render-manifests:
    name: Render Kubernetes manifests
    runs-on: [ self-hosted, deploy ]
    needs:
      - prepare
      - prepare-aks

    container:
      image: ${{ vars.ACR_NAME }}.azurecr.io/nextjs-deploy-runner:1.0
      credentials:
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Kustomize CI overlay
        shell: bash
        run: |
          mkdir -p "${KUSTOMIZE_CI_OVERLAY_DIR}"
          {
            printf '%s\n' 'apiVersion: kustomize.config.k8s.io/v1beta1'
            printf '%s\n' 'kind: Kustomization'
            printf '%s\n' 'resources:'
            printf '%s\n' '  - ../production'
            printf '%s\n' "namespace: ${K8S_NAMESPACE}"
            printf '%s\n' 'images:'
            printf '%s\n' '  - name: nextjs-webapp'
            printf '%s\n' "    newName: ${{ needs.prepare.outputs.acr_login_server }}/${IMAGE_NAME}"
            printf '%s\n' "    newTag: ${{ needs.prepare.outputs.image_tag }}"
            printf '%s\n' 'patches:'
            printf '%s\n' '  - target:'
            printf '%s\n' '      group: networking.istio.io'
            printf '%s\n' '      version: v1beta1'
            printf '%s\n' '      kind: Gateway'
            printf '%s\n' '      name: nextjs-webapp-gateway'
            printf '%s\n' '    patch: |-'
            printf '%s\n' '      - op: replace'
            printf '%s\n' '        path: /spec/servers/0/hosts/0'
            printf '%s\n' "        value: \"${{ vars.ISTIO_HOST }}\""
            printf '%s\n' '  - target:'
            printf '%s\n' '      group: networking.istio.io'
            printf '%s\n' '      version: v1beta1'
            printf '%s\n' '      kind: VirtualService'
            printf '%s\n' '      name: nextjs-webapp'
            printf '%s\n' '    patch: |-'
            printf '%s\n' '      - op: replace'
            printf '%s\n' '        path: /spec/hosts/0'
            printf '%s\n' "        value: \"${{ vars.ISTIO_HOST }}\""
          } > "${KUSTOMIZE_CI_OVERLAY_DIR}/kustomization.yaml"

      - name: Preview rendered manifests
        shell: bash
        run: kubectl kustomize "${KUSTOMIZE_CI_OVERLAY_DIR}"

  deploy:
    name: Deploy to AKS through Istio
    runs-on: [ self-hosted, deploy ]
    needs:
      - prepare
      - render-manifests
      - predeploy-verification

    container:
      image: ${{ vars.ACR_NAME }}.azurecr.io/nextjs-deploy-runner:1.0
      credentials:
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        shell: bash
        run: |
          az aks get-credentials \
            --resource-group "${{ vars.AKS_RESOURCE_GROUP }}" \
            --name "${{ vars.AKS_CLUSTER_NAME }}" \
            --overwrite-existing

      - name: Create Kustomize CI overlay
        shell: bash
        run: |
          mkdir -p "${KUSTOMIZE_CI_OVERLAY_DIR}"
          {
            printf '%s\n' 'apiVersion: kustomize.config.k8s.io/v1beta1'
            printf '%s\n' 'kind: Kustomization'
            printf '%s\n' 'resources:'
            printf '%s\n' '  - ../production'
            printf '%s\n' "namespace: ${K8S_NAMESPACE}"
            printf '%s\n' 'images:'
            printf '%s\n' '  - name: nextjs-webapp'
            printf '%s\n' "    newName: ${{ needs.prepare.outputs.acr_login_server }}/${IMAGE_NAME}"
            printf '%s\n' "    newTag: ${{ needs.prepare.outputs.image_tag }}"
            printf '%s\n' 'patches:'
            printf '%s\n' '  - target:'
            printf '%s\n' '      group: networking.istio.io'
            printf '%s\n' '      version: v1beta1'
            printf '%s\n' '      kind: Gateway'
            printf '%s\n' '      name: nextjs-webapp-gateway'
            printf '%s\n' '    patch: |-'
            printf '%s\n' '      - op: replace'
            printf '%s\n' '        path: /spec/servers/0/hosts/0'
            printf '%s\n' "        value: \"${{ vars.ISTIO_HOST }}\""
            printf '%s\n' '  - target:'
            printf '%s\n' '      group: networking.istio.io'
            printf '%s\n' '      version: v1beta1'
            printf '%s\n' '      kind: VirtualService'
            printf '%s\n' '      name: nextjs-webapp'
            printf '%s\n' '    patch: |-'
            printf '%s\n' '      - op: replace'
            printf '%s\n' '        path: /spec/hosts/0'
            printf '%s\n' "        value: \"${{ vars.ISTIO_HOST }}\""
          } > "${KUSTOMIZE_CI_OVERLAY_DIR}/kustomization.yaml"

      - name: Deploy to AKS through Istio
        shell: bash
        run: kubectl apply -k "${KUSTOMIZE_CI_OVERLAY_DIR}"

      - name: Wait for deployment rollout
        shell: bash
        run: kubectl rollout status deployment/${APP_NAME} --namespace "${K8S_NAMESPACE}" --timeout=180s
