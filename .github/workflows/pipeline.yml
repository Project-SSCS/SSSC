name: Build, Push to ACR, Deploy to AKS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  APP_NAME: nextjs-webapp
  IMAGE_NAME: nextjs-webapp
  K8S_NAMESPACE: nextjs-webapp
  KUSTOMIZE_CI_OVERLAY_DIR: k8s/overlays/ci

jobs:
  prepare:
    name: Prepare pipeline variables
    runs-on: self-hosted
    outputs:
      acr_login_server: ${{ steps.vars.outputs.acr_login_server }}
      image_tag: ${{ steps.vars.outputs.image_tag }}
      image_uri: ${{ steps.vars.outputs.image_uri }}

    steps:
      - name: Set deployment variables
        id: vars
        shell: bash
        run: |
          ACR_LOGIN_SERVER="${{ vars.ACR_NAME }}.azurecr.io"
          IMAGE_TAG="${GITHUB_SHA::12}"
          IMAGE_URI="${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${IMAGE_TAG}"

          echo "acr_login_server=${ACR_LOGIN_SERVER}" >> "${GITHUB_OUTPUT}"
          echo "image_tag=${IMAGE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "image_uri=${IMAGE_URI}" >> "${GITHUB_OUTPUT}"

  build-sbom-provenance-push:
    name: Build, sbom, provenance and push image
    runs-on: self-hosted
    needs: prepare

    container:
      image: ${{ vars.ACR_NAME }}.azurecr.io/nextjs-build-runner:1.0
      credentials:
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}
      options: --user root
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Verify Cosign
        run: cosign version

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        shell: bash
        run: az acr login --name "${{ vars.ACR_NAME }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container

      - name: Build and push image using BuildKit
        id: build
        uses: docker/build-push-action@v7
        with:
          context: "{{defaultContext}}"
          file: ./Dockerfile
          push: true
          tags: |
            ${{ needs.prepare.outputs.image_uri }}
            ${{ needs.prepare.outputs.acr_login_server }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false
          build-args: |
            BUILDKIT_CONTEXT_KEEP_GIT_DIR=1
      
      - name: Confirm containerized build
        run: |
          cat /etc/os-release
          ls -la /.dockerenv || true

      - name: Sign Image
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes \
            "${{ needs.prepare.outputs.acr_login_server }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}"

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM
        run: |
          syft "${{ needs.prepare.outputs.acr_login_server }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}" \
            -o spdx-json=sbom.spdx.json

      - name: Attach SBOM attestation
        run: |
          cosign attest --yes \
            --predicate sbom.spdx.json \
            --type spdxjson \
            "${{ needs.prepare.outputs.acr_login_server }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}"

      - name: Create provenance predicate
        shell: bash
        run: |
          jq -n \
            --arg repo "git+https://github.com/${{ github.repository }}" \
            --arg sha "${{ github.sha }}" \
            --arg run_id "${{ github.run_id }}" \
            '{
              builder: {
                id: "github-actions-self-hosted-azure-runner"
              },
              buildType: "https://github.com/Attestations/GitHubActionsWorkflow",
              invocation: {
                configSource: {
                  uri: $repo,
                  digest: {
                    sha1: $sha
                  },
                  entryPoint: ".github/workflows/pipeline.yml"
                }
              },
              metadata: {
                buildInvocationId: $run_id,
                completeness: {
                  parameters: true,
                  environment: true,
                  materials: true
                },
                reproducible: false
              }
            }' > provenance.json

      - name: Attach provenance attestation
        run: |
          cosign attest --yes \
            --predicate provenance.json \
            --type slsaprovenance \
            "${{ needs.prepare.outputs.acr_login_server }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}"

      - name: Verify Signature
        run: |
          cosign verify \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${{ needs.prepare.outputs.acr_login_server }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}"

      - name: Download Attestations
        run: |
          cosign download attestation \
            "${{ needs.prepare.outputs.acr_login_server }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}"
  
  prepare-aks:
    name: Prepare AKS namespace and secrets
    runs-on: self-hosted
    needs: build-sbom-provenance-push

    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        shell: bash
        run: |
          az aks get-credentials \
            --resource-group "${{ vars.AKS_RESOURCE_GROUP }}" \
            --name "${{ vars.AKS_CLUSTER_NAME }}" \
            --overwrite-existing

      - name: Create or update namespace
        shell: bash
        run: |
          kubectl create namespace "${K8S_NAMESPACE}" --dry-run=client -o yaml | kubectl apply -f -
          kubectl label namespace "${K8S_NAMESPACE}" istio-injection=enabled --overwrite

      - name: Create or update MongoDB secret
        shell: bash
        run: |
          kubectl create secret generic mongodb-credentials \
            --namespace "${K8S_NAMESPACE}" \
            --from-literal=MONGODB_URI='${{ secrets.MONGODB_URI }}' \
            --dry-run=client -o yaml | kubectl apply -f -

  render-manifests:
    name: Render Kubernetes manifests
    runs-on: self-hosted
    needs:
      - prepare
      - prepare-aks

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Kustomize CI overlay
        shell: bash
        run: |
          mkdir -p "${KUSTOMIZE_CI_OVERLAY_DIR}"
          {
            printf '%s\n' 'apiVersion: kustomize.config.k8s.io/v1beta1'
            printf '%s\n' 'kind: Kustomization'
            printf '%s\n' 'resources:'
            printf '%s\n' '  - ../production'
            printf '%s\n' "namespace: ${K8S_NAMESPACE}"
            printf '%s\n' 'images:'
            printf '%s\n' '  - name: nextjs-webapp'
            printf '%s\n' "    newName: ${{ needs.prepare.outputs.acr_login_server }}/${IMAGE_NAME}"
            printf '%s\n' "    newTag: ${{ needs.prepare.outputs.image_tag }}"
            printf '%s\n' 'patches:'
            printf '%s\n' '  - target:'
            printf '%s\n' '      group: networking.istio.io'
            printf '%s\n' '      version: v1beta1'
            printf '%s\n' '      kind: Gateway'
            printf '%s\n' '      name: nextjs-webapp-gateway'
            printf '%s\n' '    patch: |-'
            printf '%s\n' '      - op: replace'
            printf '%s\n' '        path: /spec/servers/0/hosts/0'
            printf '%s\n' "        value: \"${{ vars.ISTIO_HOST }}\""
            printf '%s\n' '  - target:'
            printf '%s\n' '      group: networking.istio.io'
            printf '%s\n' '      version: v1beta1'
            printf '%s\n' '      kind: VirtualService'
            printf '%s\n' '      name: nextjs-webapp'
            printf '%s\n' '    patch: |-'
            printf '%s\n' '      - op: replace'
            printf '%s\n' '        path: /spec/hosts/0'
            printf '%s\n' "        value: \"${{ vars.ISTIO_HOST }}\""
          } > "${KUSTOMIZE_CI_OVERLAY_DIR}/kustomization.yaml"

      - name: Preview rendered manifests
        shell: bash
        run: kubectl kustomize "${KUSTOMIZE_CI_OVERLAY_DIR}"

  deploy:
    name: Deploy to AKS through Istio
    runs-on: self-hosted
    needs:
      - prepare
      - render-manifests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        shell: bash
        run: |
          az aks get-credentials \
            --resource-group "${{ vars.AKS_RESOURCE_GROUP }}" \
            --name "${{ vars.AKS_CLUSTER_NAME }}" \
            --overwrite-existing

      - name: Create Kustomize CI overlay
        shell: bash
        run: |
          mkdir -p "${KUSTOMIZE_CI_OVERLAY_DIR}"
          {
            printf '%s\n' 'apiVersion: kustomize.config.k8s.io/v1beta1'
            printf '%s\n' 'kind: Kustomization'
            printf '%s\n' 'resources:'
            printf '%s\n' '  - ../production'
            printf '%s\n' "namespace: ${K8S_NAMESPACE}"
            printf '%s\n' 'images:'
            printf '%s\n' '  - name: nextjs-webapp'
            printf '%s\n' "    newName: ${{ needs.prepare.outputs.acr_login_server }}/${IMAGE_NAME}"
            printf '%s\n' "    newTag: ${{ needs.prepare.outputs.image_tag }}"
            printf '%s\n' 'patches:'
            printf '%s\n' '  - target:'
            printf '%s\n' '      group: networking.istio.io'
            printf '%s\n' '      version: v1beta1'
            printf '%s\n' '      kind: Gateway'
            printf '%s\n' '      name: nextjs-webapp-gateway'
            printf '%s\n' '    patch: |-'
            printf '%s\n' '      - op: replace'
            printf '%s\n' '        path: /spec/servers/0/hosts/0'
            printf '%s\n' "        value: \"${{ vars.ISTIO_HOST }}\""
            printf '%s\n' '  - target:'
            printf '%s\n' '      group: networking.istio.io'
            printf '%s\n' '      version: v1beta1'
            printf '%s\n' '      kind: VirtualService'
            printf '%s\n' '      name: nextjs-webapp'
            printf '%s\n' '    patch: |-'
            printf '%s\n' '      - op: replace'
            printf '%s\n' '        path: /spec/hosts/0'
            printf '%s\n' "        value: \"${{ vars.ISTIO_HOST }}\""
          } > "${KUSTOMIZE_CI_OVERLAY_DIR}/kustomization.yaml"

      - name: Deploy to AKS through Istio
        shell: bash
        run: kubectl apply -k "${KUSTOMIZE_CI_OVERLAY_DIR}"

      - name: Wait for deployment rollout
        shell: bash
        run: kubectl rollout status deployment/${APP_NAME} --namespace "${K8S_NAMESPACE}" --timeout=180s
