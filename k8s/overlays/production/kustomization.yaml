apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
namespace: nextjs-webapp
labels:
  - pairs:
      app.kubernetes.io/name: nextjs-webapp
      app.kubernetes.io/part-of: nextjs-webapp
images:
  - name: nextjs-webapp
    newName: nextjs-webapp
    newTag: latest
