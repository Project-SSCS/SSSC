apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: nextjs-webapp
spec:
  hosts:
    - nextjs.example.com
  gateways:
    - nextjs-webapp-gateway
  http:
    - match:
        - uri:
            prefix: /
      route:
        - destination:
            host: nextjs-webapp
            port:
              number: 80
