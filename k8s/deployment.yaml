apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextjs-webapp
  namespace: nextjs-webapp
  labels:
    app: nextjs-webapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nextjs-webapp
  template:
    metadata:
      labels:
        app: nextjs-webapp
    spec:
      containers:
        - name: nextjs-webapp
          image: ghcr.io/your-org/nextjs-webapp:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: mongodb-credentials
                  key: MONGODB_URI
            - name: MONGODB_DB
              valueFrom:
                configMapKeyRef:
                  name: nextjs-webapp-config
                  key: MONGODB_DB
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
